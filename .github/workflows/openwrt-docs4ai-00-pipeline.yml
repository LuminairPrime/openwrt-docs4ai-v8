name: openwrt-docs4ai pipeline

on:
  schedule:
    - cron: "0 4 1 * *"  # 1st of each month at 4:00 UTC
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_wiki:
        description: 'Skip wiki scraping'
        type: boolean
        default: false
      skip_buildroot:
        description: 'Skip buildroot/examples extraction'
        type: boolean
        default: false
      skip_ai:
        description: 'Skip AI summarization'
        type: boolean
        default: true
      max_ai_files:
        description: 'Max files for AI summarization (saves quota)'
        type: number
        default: 40

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PUBLISH_DIR: openwrt-condensed-docs

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Set dynamic environment variables
        run: |
          echo "OUTDIR=${{ github.workspace }}/staging" >> $GITHUB_ENV
          echo "WORKDIR=${{ github.workspace }}/tmp" >> $GITHUB_ENV

      # ── Setup ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need prior commit for CHANGES.md diff

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          pip install -r .github/scripts/requirements.txt
          npm install -g jsdoc-to-markdown
          sudo apt-get update -qq && sudo apt-get install -y -qq pandoc

      - name: Create staging directories
        run: |
          mkdir -p "$OUTDIR"
          mkdir -p "$WORKDIR"

      # ── Phase 1: Clone repos ───────────────────────────
      - name: "Phase 1: Clone upstream repositories"
        env:
          SKIP_BUILDROOT: ${{ inputs.skip_buildroot }}
        run: python .github/scripts/openwrt-docs4ai-01-clone-repos.py

      # ── Phase 2: Scrape (parallel) ─────────────────────
      - name: "Phase 2: Scrape all sources (parallel)"
        env:
          SKIP_WIKI: ${{ inputs.skip_wiki }}
          SKIP_BUILDROOT: ${{ inputs.skip_buildroot }}
        run: |
          python .github/scripts/openwrt-docs4ai-02a-scrape-wiki.py &
          python .github/scripts/openwrt-docs4ai-02b-scrape-ucode.py &
          python .github/scripts/openwrt-docs4ai-02c-scrape-jsdoc.py &
          python .github/scripts/openwrt-docs4ai-02d-scrape-core-packages.py &
          python .github/scripts/openwrt-docs4ai-02e-scrape-example-packages.py &
          wait

      # ── Phase 3: Enrichment ────────────────────────────
      - name: "Phase 3: Cross-reference injection"
        run: python .github/scripts/openwrt-docs4ai-03-add-links.py

      - name: "Phase 3: AI summaries"
        env:
          SKIP_AI: ${{ inputs.skip_ai || 'true' }}
          MAX_AI_FILES: ${{ inputs.max_ai_files || '40' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/openwrt-docs4ai-04-generate-summaries.py

      # ── Phase 4: Assembly & Indexing ───────────────────
      - name: "Phase 4: Assemble complete references"
        env:
          SKIP_WIKI: ${{ inputs.skip_wiki }}
          SKIP_BUILDROOT: ${{ inputs.skip_buildroot }}
        run: python .github/scripts/openwrt-docs4ai-05-assemble-references.py

      - name: "Phase 4: Generate indexes"
        run: python .github/scripts/openwrt-docs4ai-06-generate-index.py

      # ── Phase 5: Validation Gate ───────────────────────
      - name: "Phase 5: VALIDATE (staging gate)"
        run: python .github/scripts/openwrt-docs4ai-07-validate.py

      # ── Phase 6: Promote ───────────────────────────────
      - name: "Phase 6: Promote staging to repository"
        run: |
          echo "Promoting $OUTDIR → $PUBLISH_DIR"
          rsync -a --delete "$OUTDIR/" "$GITHUB_WORKSPACE/$PUBLISH_DIR/"

      # ── Phase 7: Commit ────────────────────────────────
      - name: "Phase 7: Commit changes"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$PUBLISH_DIR/"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: auto-update $(date -u +%Y-%m-%d)"
            git push
          fi

      # ── Failure: Upload staging for debugging ──────────
      - name: Upload staging artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-staging-output
          path: ${{ github.workspace }}/staging
          retention-days: 7

  # ── GitHub Pages deployment ──────────────────────────
  deploy-pages:
    needs: generate-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout (with updated docs)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: openwrt-condensed-docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
